<div class="product-card">
  <img [src]="product().image" [alt]="product().name">
  <h3>{{ product().name }}</h3>
  <p class="desc">{{ product().description }}</p>
  <p class="price">Price: {{ product().price }} ₸</p>
  
  <p class="rating">
    Rating: 
    @for (star of [1,2,3,4,5]; track star) {
      <span [style.color]="star <= product().rating ? '#ffc107' : '#e4e5e9'">★</span>
    }
  </p>
  
  <div class="actions">
    <button (click)="like()" class="like-btn">❤️ {{ product().likes }}</button>
    <button (click)="share('whatsapp')" class="share-btn wa">WhatsApp</button>
    <button (click)="share('telegram')" class="share-btn tg">Telegram</button>
    <button (click)="delete()" class="delete-btn">🗑️ Remove</button>
  </div>
</div>
