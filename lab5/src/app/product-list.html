<div class="product-grid">
  @for (item of filteredProducts(); track item.id) {
    <app-product-item 
      [product]="item" 
      (remove)="handleRemove($event)">
    </app-product-item>
  } @empty {
    <div class="empty-msg">
      <p>Бұл категорияда әзірге тауар жоқ.</p>
    </div>
  }
</div>
